rules:
  - id: aegis.weak-crypto.math-random-in-security-context
    pattern: Math.random()
    message: >
      Math.random() is not cryptographically secure and must not be used for
      security-sensitive values (tokens, nonces, IDs, salts).
      Use crypto.getRandomValues() (browser) or crypto.randomBytes() / crypto.randomUUID() (Node.js).
    severity: ERROR
    languages: [typescript, javascript]
    paths:
      include:
        - "src/app/api/**"
        - "app/api/**"
        - "src/lib/**"
        - "lib/**"
        - "src/utils/**"
        - "utils/**"
        - "src/services/**"
        - "services/**"
    metadata:
      category: security
      owasp: "A02:2021 - Cryptographic Failures"
      cwe: "CWE-338: Use of Cryptographically Weak Pseudo-Random Number Generator (PRNG)"

  - id: aegis.weak-crypto.weak-hash-algorithm
    pattern-either:
      - pattern: createHash('md5')
      - pattern: createHash("md5")
      - pattern: createHash('sha1')
      - pattern: createHash("sha1")
    message: >
      Weak cryptographic hash function detected. MD5 and SHA-1 are considered
      cryptographically broken and must not be used for security purposes
      (password hashing, integrity checks, digital signatures).
      Use SHA-256 or stronger, or bcrypt/argon2 for password hashing.
    severity: ERROR
    languages: [typescript, javascript]
    metadata:
      category: security
      owasp: "A02:2021 - Cryptographic Failures"
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"

  - id: aegis.weak-crypto.sha256-for-token-generation
    patterns:
      - pattern: createHash('sha256')
      - pattern-not-inside: |
          createHmac(...)
    message: >
      Plain SHA-256 hash (createHash) used where HMAC should be preferred.
      For token generation, message authentication, or keyed signatures use
      createHmac('sha256', secret) to bind the output to a secret key
      and prevent length-extension attacks.
    severity: WARNING
    languages: [typescript, javascript]
    metadata:
      category: security
      owasp: "A02:2021 - Cryptographic Failures"
      cwe: "CWE-347: Improper Verification of Cryptographic Signature"

  - id: aegis.weak-crypto.hardcoded-api-key
    pattern-regex: (sk_live_|sk_test_|AKIA)[A-Za-z0-9]{10,}
    message: >
      Hardcoded API key or AWS Access Key ID detected in source code.
      Credentials must never be committed to version control. Use environment
      variables and a secrets manager instead.
    severity: ERROR
    languages: [typescript, javascript, generic]
    metadata:
      category: security
      owasp: "A07:2021 - Identification and Authentication Failures"
      cwe: "CWE-798: Use of Hard-coded Credentials"
