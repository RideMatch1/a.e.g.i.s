  - { category: foundation, name: middleware-hardened }
  - { category: foundation, name: logger-pii-safe }
  - { category: foundation, name: i18n-next-intl }
  - { category: compliance, name: dsgvo-kit }
  - { category: compliance, name: legal-pages-de }
