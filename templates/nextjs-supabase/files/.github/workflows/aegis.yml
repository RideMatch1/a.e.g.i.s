# AEGIS CI workflow — generated by `aegis init`.
#
# Pinned to a specific tag via `aegis-version` below for reproducibility +
# SLSA-chain integrity. Bump the tag and re-run `aegis init` to upgrade.
#
# SECURITY: AEGIS-CLI v0.16.6+ rejects shell-metachars in --diff refs and
# the underlying github-action passes inputs via env vars (not shell
# substitution). Earlier versions (<= v0.16.5) had two CRITICAL issues:
#   * CWE-78 in the --diff path of @aegis-scan/cli
#   * GHA template-injection in the action's run-blocks
# DO NOT downgrade to a tag below v0.16.6.
name: AEGIS
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

# External scanner versions — pinned for CI reproducibility.
# Bump here when an upstream fix is needed. These four are AEGIS's
# CI-installable defaults; the full 19-tool pipeline includes
# Docker-based scanners (ZAP, Lighthouse), plus 3 LLM-agent pentest
# frameworks (Strix, PTAI, Pentest-Swarm-AI — opt-in via `--mode pentest`,
# require LLM-API-keys) — see the README "Enabling the full pipeline"
# section for local install.
env:
  SEMGREP_VERSION: "1.94.0"
  OSV_SCANNER_VERSION: "v1.9.2"
  GITLEAKS_VERSION: "v8.19.0"
  GITLEAKS_CHECKSUM: "b7ac0aa997f6cee6e12b006a1ce5aae9f62357fa952a9b9c3449f0549798d7f9"
  TRUFFLEHOG_VERSION: "v3.82.0"
  TRUFFLEHOG_CHECKSUM: "2332b24d85154dee2d1f6ccad4561a622a6086d36214af274336c927b74daf33"

jobs:
  aegis-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Semgrep
        run: pip install "semgrep==${{ env.SEMGREP_VERSION }}"
      - name: Install OSV-Scanner
        run: go install "github.com/google/osv-scanner/cmd/osv-scanner@${{ env.OSV_SCANNER_VERSION }}"
      - name: Install Gitleaks
        run: |
          V="${GITLEAKS_VERSION#v}"
          mkdir -p "$HOME/bin"
          curl -sSL -o /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${V}_linux_x64.tar.gz"
          echo "${GITLEAKS_CHECKSUM}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xz -C "$HOME/bin" -f /tmp/gitleaks.tar.gz gitleaks
          echo "$HOME/bin" >> "$GITHUB_PATH"
      - name: Install TruffleHog
        run: |
          V="${TRUFFLEHOG_VERSION#v}"
          mkdir -p "$HOME/bin"
          curl -sSL -o /tmp/trufflehog.tar.gz "https://github.com/trufflesecurity/trufflehog/releases/download/${TRUFFLEHOG_VERSION}/trufflehog_${V}_linux_amd64.tar.gz"
          echo "${TRUFFLEHOG_CHECKSUM}  /tmp/trufflehog.tar.gz" | sha256sum -c -
          tar -xz -C "$HOME/bin" -f /tmp/trufflehog.tar.gz trufflehog
          echo "$HOME/bin" >> "$GITHUB_PATH"

      # `mode: audit` runs AEGIS's built-in scanners AND auto-invokes the
      # four external tools pinned above (Semgrep, OSV-Scanner, Gitleaks,
      # TruffleHog) into the unified finding-pipeline — v0.13+ behavior.
      # For local audit runs outside CI, install each via `brew install
      # <tool>` or the distro equivalent (apt / dnf / scoop).
      - name: Run AEGIS (audit mode)
        uses: RideMatch1/a.e.g.i.s/ci/github-action@v{{AEGIS_VERSION}}
        with:
          mode: audit
          fail-on-blocker: 'true'
          comment-on-pr: 'true'
          diff-against: ${{ github.base_ref && format('origin/{0}', github.base_ref) || '' }}
          aegis-version: v{{AEGIS_VERSION}}
