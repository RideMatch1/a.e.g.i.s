name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 — SHA-pinned per v0.16.3 D-CA-003 (C2-threat-class self-advice-followed)
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.3.0 — SHA-pinned per v0.16.3 D-CA-003
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0 — SHA-pinned per v0.16.3 D-CA-003
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Type-check (catches interface mismatches mocks may hide)
        run: cd packages/core && npx tsc --noEmit && cd ../scanners && npx tsc --noEmit && cd ../reporters && npx tsc --noEmit && cd ../cli && npx tsc --noEmit
      - run: pnpm test
      - name: Benchmark (21 planted vulnerabilities + 9 clean-file FP checks)
        run: pnpm benchmark
