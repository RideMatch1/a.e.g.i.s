name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 — SHA-pinned per v0.16.3 D-CA-003 (C2-threat-class self-advice-followed)
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.3.0 — SHA-pinned per v0.16.3 D-CA-003
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4.4.0 — SHA-pinned per v0.16.3 D-CA-003
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Lint — real type-drift gate across 5 shipped packages (v0.16.3 D-CA-002)
        run: pnpm lint
      - run: pnpm test
      - name: Benchmark (21 planted vulnerabilities + 9 clean-file FP checks)
        run: pnpm benchmark
