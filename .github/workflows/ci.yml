name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 — SHA-pinned per v0.16.3 D-CA-003 (C2-threat-class self-advice-followed)
      - name: Supply-chain — enforce GHA action SHA-pin policy (closes tj-actions-class)
        run: bash scripts/check-gha-sha-pin.sh
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.3.0 — SHA-pinned per v0.16.3 D-CA-003
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0 — SHA-pinned per v0.16.3 D-CA-003
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Supply-chain — dep cooldown lint (closes rushed-update window)
        run: bash scripts/check-dep-cooldown.sh
      - run: pnpm build
      - name: Supply-chain — dist/ planning-artifact leak gate (audit L1)
        run: bash scripts/check-dist-codename-leak.sh
      - name: Lint — real type-drift gate across 5 shipped packages (v0.16.3 D-CA-002)
        run: pnpm lint
      - run: pnpm test
      - name: Benchmark (21 planted vulnerabilities + 9 clean-file FP checks)
        run: pnpm benchmark
