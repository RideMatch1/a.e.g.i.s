name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Type-check (catches interface mismatches mocks may hide)
        run: cd packages/core && npx tsc --noEmit && cd ../scanners && npx tsc --noEmit && cd ../reporters && npx tsc --noEmit && cd ../cli && npx tsc --noEmit
      - run: pnpm test
      - name: Benchmark (15 planted vulnerabilities)
        run: pnpm benchmark
