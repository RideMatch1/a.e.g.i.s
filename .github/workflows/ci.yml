name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 — SHA-pinned per v0.16.3 D-CA-003 (C2-threat-class self-advice-followed)
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v4.3.0 — SHA-pinned per v0.16.3 D-CA-003
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0 — SHA-pinned per v0.16.3 D-CA-003
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Lint — real type-drift gate across 5 shipped packages (v0.16.3 D-CA-002)
        run: pnpm lint
      - run: pnpm test
      - name: Benchmark (21 planted vulnerabilities + 9 clean-file FP checks)
        run: pnpm benchmark
