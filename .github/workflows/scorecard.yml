name: OSSF Scorecard

# OSSF Scorecard assesses security-posture across ~18 dimensions
# (signed-releases, branch-protection, code-review, CI-checks, token-
# permissions, dependency-update tools, SAST, fuzzing, and more).
# Results upload to GitHub code-scanning + generate a public badge.

on:
  push:
    branches: [main]
  schedule:
    # Monday 06:30 UTC
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF to code-scanning
      id-token: write          # generate OIDC token for publish-results
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — SHA-pinned per v0.16.3 D-CA-003; Node-24 per v0.17.3 SC-2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.28.1
        with:
          sarif_file: results.sarif
