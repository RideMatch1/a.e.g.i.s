name: Publish @aegis-wizard/cli

# Triggered on tag-push matching wizard-v-prefix (e.g. wizard-v0.17.0).
# Publishes @aegis-wizard/cli with npm-provenance for SLSA Level-2
# attestation bound to this exact workflow run, this exact commit, and
# this exact npm-registry identity. Consumers can verify via
# `npm audit signatures` or
# `npm view @aegis-wizard/cli@<version> dist.attestations`.
#
# Scope: @aegis-wizard/cli only. The @aegis-scan/* family is published
# by the sibling `.github/workflows/publish.yml` workflow on a separate
# `v*` tag-namespace; this workflow does not touch those packages and
# the pnpm filter (-F @aegis-wizard/cli) enforces that at publish-time.
#
# Prerequisites:
#   - Repo secret NPM_TOKEN_WIZARD (publish-scope token for
#     @aegis-wizard org). Advisor-recommended Option-ii for
#     scope-separation from the existing NPM_TOKEN (which is scoped to
#     @aegis-scan only per publish.yml). If Lukas instead reused a
#     single classic-token by replacing NPM_TOKEN with an account-wide
#     token covering both orgs (Option-i), swap NPM_TOKEN_WIZARD →
#     NPM_TOKEN in the env block below before pushing the tag.
#   - The tag being pushed matches the release-commit that sets
#     @aegis-wizard/cli to the target version in its package.json.
#
# Fallback: If this workflow ever fails at publish-time and the release
# window is tight, a maintainer can publish manually from their laptop
# via `pnpm -F @aegis-wizard/cli publish --access public --no-git-checks`
# — that path ships without SLSA provenance, which is a documented
# known-gap recovered in the next release cycle.

on:
  push:
    tags:
      - 'wizard-v*'

permissions:
  contents: read
  id-token: write  # required for npm --provenance (OIDC attestation)

jobs:
  publish:
    name: Publish @aegis-wizard/cli with SLSA provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 — SHA-pinned per v0.16.3 D-CA-003

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.3.0 — SHA-pinned per v0.16.3 D-CA-003

      - name: Setup Node.js + npm registry auth
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0 — SHA-pinned per v0.16.3 D-CA-003
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build wizard-cli plus transitive deps
        run: pnpm -F @aegis-wizard/cli... build

      - name: Verify wizard-cli tests before publish
        run: pnpm -F @aegis-wizard/cli test

      - name: Verify no install-time lifecycle scripts (structural invariant)
        # Safety-property: packages under @aegis-wizard/cli MUST NOT
        # declare preinstall, install, postinstall, preuninstall,
        # postuninstall, or prepare lifecycle scripts. A consumer
        # running `npm install @aegis-wizard/cli` should execute zero
        # scripts from our namespace. This gate makes the invariant
        # impossible to regress silently.
        run: |
          node -e "
          const path = 'packages/wizard-cli/package.json';
          const pkg = require(process.cwd() + '/' + path);
          const danger = ['preinstall','install','postinstall','preuninstall','postuninstall','prepare'];
          const scripts = pkg.scripts || {};
          const hits = danger.filter((k) => Object.prototype.hasOwnProperty.call(scripts, k));
          if (hits.length > 0) {
            console.error('::error::' + path + ' declares install-time lifecycle script(s): ' + hits.join(', '));
            process.exit(1);
          }
          console.log(path + ': clean — no install-time lifecycle scripts declared');
          "

      - name: Verify no install-hint-style version-pins in shipped src
        # Mirrors the scanner publish.yml gate. Tool names like
        # `aegis-wizard new` are stable across 0.17.x releases and
        # should not carry parenthesized version anchors inside
        # string-literals. Catches accidents where a version-bump
        # leaves a literal "(wizard-v0.17.0)" or "(v0.17.0)" inside
        # a user-facing message.
        run: |
          if grep -rnE "[\"'\`][^\"'\`]*\((wizard-)?v0\.17\.[0-9]+\)[^\"'\`]*[\"'\`]" packages/wizard-cli/src/; then
            echo "::error::Install-hint-style version pin found in a"
            echo "string-literal in shipped wizard-cli source. Remove"
            echo "the version-pin — tool names are stable across 0.17.x"
            echo "and do not need version anchors. Compute runtime"
            echo "version references from package.json at build time"
            echo "rather than hardcoding the literal."
            exit 1
          fi

      - name: Verify no internal-codename leaks in shipped tarball
        # Safety-net between the local Rule #13 commit-msg hook and the
        # published binary: if a scrub-term slipped past the developer
        # hook (stale install, hook bypassed, or a new term added to
        # the local list without matching here) the tarball-extract
        # grep below catches it before npm ever sees the bits.
        run: |
          cd packages/wizard-cli
          pnpm pack --pack-destination /tmp/tarball-scrub
          mkdir -p /tmp/tarball-check
          tar -xzf /tmp/tarball-scrub/*.tgz -C /tmp/tarball-check
          # Private codenames only. Generic product-refs like Claude,
          # Anthropic, Codex, Cursor are legitimate here per the
          # wizard-cli keyword list and must NOT be in this list.
          SCRUB='Spa-App|spa-app|lukas|hertle|ucos|voidai|sonnenhof|hundementor|myspa|hotel-pilot|UCOS-space|VoidAI|aegis-precision'
          if grep -riE "$SCRUB" /tmp/tarball-check/; then
            echo "::error::Internal codename leaked into shipped tarball; refusing to publish"
            exit 1
          fi

      - name: Publish @aegis-wizard/cli with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_WIZARD }}
        run: pnpm -F @aegis-wizard/cli publish --provenance --access public --no-git-checks
