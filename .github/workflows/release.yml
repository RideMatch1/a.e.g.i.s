name: Release
on:
  release:
    types: [published]

# Release asset attachment only — the tag/release is created manually by the
# maintainer (or via `gh release create`). This workflow reacts after the
# release is published and uploads any build artifacts that take too long
# or are too platform-specific to build in the release-drafting flow.
#
# Currently: builds the VS Code extension .vsix and attaches it to the
# GitHub release. The extension is NOT yet published to the VS Code
# Marketplace; users install via `code --install-extension <vsix>` from the
# Releases page.
#
# Validator-report MINOR-03: the .vsix was previously not pre-built in any
# release, so the README's `code --install-extension aegis-vscode-X.Y.Z.vsix`
# instruction required the user to run `vsce package` first. This workflow
# closes that gap.
#
# Implementation notes:
#   - packages/vscode-extension is EXCLUDED from the pnpm workspace
#     (pnpm-workspace.yaml: `- "!packages/vscode-extension"`). It has its
#     own isolated dep install. We therefore run `npm install` inside the
#     extension dir, not `pnpm install` at the root.
#   - `vsce package --no-dependencies` bundles only the compiled output;
#     VS Code extensions don't use the monorepo's `@aegis-scan/*` packages
#     at runtime (they shell out to a user-installed CLI).

permissions:
  contents: write  # required to upload release assets via gh

jobs:
  vscode-extension:
    name: Build + attach VS Code .vsix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 — SHA-pinned per v0.16.3 D-CA-003
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0 — SHA-pinned per v0.16.3 D-CA-003
        with:
          node-version: '20'

      - name: Install VS Code extension deps (isolated from pnpm workspace)
        working-directory: packages/vscode-extension
        run: npm install --no-audit --no-fund

      - name: Compile TypeScript
        working-directory: packages/vscode-extension
        run: npm run build

      - name: Package the extension to a .vsix
        working-directory: packages/vscode-extension
        run: npm run package

      - name: Upload .vsix to the GitHub release
        working-directory: packages/vscode-extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VSIX_FILE=$(ls aegis-vscode-*.vsix 2>/dev/null | head -1 || true)
          if [ -z "${VSIX_FILE}" ] || [ ! -s "${VSIX_FILE}" ]; then
            echo "::error::vsce package produced no .vsix file — check the Build + Package steps above"
            exit 1
          fi
          echo "Uploading ${VSIX_FILE} to release ${{ github.event.release.tag_name }}"
          gh release upload "${{ github.event.release.tag_name }}" "${VSIX_FILE}" --clobber

  # Placeholder for future release assets (Marketplace publish, Docker image,
  # npm-provenance attestations, etc.). Keep one job per asset so failures
  # are isolated.
