name: Publish

# Triggered on tag-push matching v-prefix (e.g. v0.15.2). Runs the
# monorepo publish with npm-provenance so every published package
# carries a signed SLSA Level-2 attestation bound to this exact
# workflow run, this exact commit, and this exact npm-registry
# identity. Consumers can verify with `npm audit signatures` or
# `npm view @aegis-scan/<pkg>@<version> dist.attestations`.
#
# Prerequisites:
#   - Repo secret NPM_TOKEN (automation-token with publish scope on
#     the @aegis-scan org). Configured via `gh secret set NPM_TOKEN`.
#   - The tag being pushed matches the release-commit that bumped
#     the five `packages/*/package.json` files to the same version.
#
# Fallback: If this workflow ever fails at publish-time and the
# release window is tight, a maintainer can publish manually from
# their laptop with `pnpm -r publish --access public --no-git-checks`
# — that path ships without provenance, which is a documented
# known-gap per CHANGELOG and completes in the next release cycle.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # required for npm --provenance (OIDC attestation)

jobs:
  publish:
    name: Publish @aegis-scan/* with SLSA provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — SHA-pinned per v0.16.3 D-CA-003; Node-24 runner-support per v0.17.4 SC-5 Sub-arc B (Node-20 deprecation 2026-06-02)

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.3.0 — SHA-pinned per v0.16.3 D-CA-003

      - name: Setup Node.js + npm registry auth
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0 — SHA-pinned per v0.16.3 D-CA-003
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build shipped packages
        run: pnpm build

      # v0.15.5 D-A-002 — block install-hint-style version-pins like
      # "(v0.15.X)" embedded in string literals of shipped source. The
      # v0.15.4 release shipped with `aegis doctor (v0.15.3)` left over
      # from a prior release — by v0.15.4 that was stale-by-one-version
      # install-hint text in the cold-install-UX banner. The grep
      # targets parenthesized-version-pins inside quoted strings
      # (single, double, or backtick) only — historical references in
      # comments like `// v0.15.4 D-N-003` or `* introduced in v0.15.2`
      # are intentional documentation of when each change landed and
      # are NOT blocked. Tool names like `aegis doctor` are stable
      # across releases and do not need version anchors in
      # user-facing strings.
      - name: Verify no install-hint-style version-pins in shipped src
        run: |
          if grep -rnE "[\"'\`][^\"'\`]*\(v0\.15\.[0-9]+\)[^\"'\`]*[\"'\`]" packages/*/src/; then
            echo "::error::Install-hint-style version pin (v0.15.X) found in a"
            echo "string-literal in shipped source. Remove the version-pin —"
            echo "tool names like 'aegis doctor' are stable and do not need"
            echo "version anchors. If a runtime version reference is genuinely"
            echo "needed, compute it from package.json at build time rather"
            echo "than hardcoding the literal."
            exit 1
          fi

      - name: Generate SBOM + manifest-confusion gate per package (SBOM-first)
        # Closes two threat-classes in a single per-package loop:
        #
        #   1. Manifest-confusion (Darcy Clarke, June 2024): a malicious
        #      tarball can ship a package.json that diverges from what
        #      the registry-API exposes. We pre-pack each scanner-family
        #      package, compare its tarball-manifest against its source-
        #      manifest on 12 security-critical fields (deps, scripts,
        #      bin, etc.), and refuse to publish on divergence.
        #
        #   2. Supply-chain visibility: the SBOM enumerates every
        #      transitive dep with version + license + import-evidence +
        #      source-file-location. Downstream consumers can compare
        #      against the registry-served manifest and detect drift
        #      independently of npm provenance. SLSA + SBOM are
        #      complementary: provenance proves WHO built it, SBOM
        #      proves WHAT is in it.
        #
        # SBOM-first ordering: the SBOM is generated INTO packages/<pkg>/
        # BEFORE pnpm pack runs, so the tarball that the manifest-confusion
        # gate verifies is byte-identical to the tarball pnpm publishes in
        # the next step. Earlier ordering (pack → manifest-check →
        # SBOM-write → pnpm-r-publish-repacks) caused the published tarball
        # to contain SBOM JSON that the manifest-gate had not seen.
        run: |
          mkdir -p /tmp/manifest-confusion-tarballs
          for pkg in core scanners reporters cli mcp-server; do
            bash scripts/generate-sbom.sh "packages/$pkg"
            (cd "packages/$pkg" && pnpm pack --pack-destination /tmp/manifest-confusion-tarballs --silent)
            TARBALL=$(ls /tmp/manifest-confusion-tarballs/aegis-scan-$pkg-*.tgz | tail -1)
            echo "▸ Checking @aegis-scan/$pkg → $(basename "$TARBALL")"
            node scripts/check-manifest-confusion.mjs "packages/$pkg" "$TARBALL"
          done

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -r publish --provenance --access public --no-git-checks
