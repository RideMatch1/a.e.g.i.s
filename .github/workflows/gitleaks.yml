name: Gitleaks

# Gitleaks scans for accidentally committed secrets (API keys, tokens,
# private keys, cloud credentials). Runs on every PR against main and
# on every push to main. Protection-mode scans only the new commits
# in a PR, so existing history is not re-flagged on every run.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: Scan for committed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v5.0.1
        with:
          # Full history required so scan covers the PR branch plus base.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          # Required by gitleaks-action v2.3+ for pull-request events so
          # the action can read the PR metadata from the GitHub API.
          # Read-only access is sufficient; no write permissions needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # License token is not required for public repositories owned
          # by individual users. Scan config uses gitleaks defaults
          # (broad coverage of AWS, GCP, GitHub, Slack, Stripe, generic
          # high-entropy strings).
          GITLEAKS_ENABLE_SUMMARY: "true"
          # Comments-on-PR disabled: Dependabot PRs run with a read-only
          # GITHUB_TOKEN by default and cannot post comments, which would
          # cause consistent failures on weekly dep-update PRs. Summary
          # in the workflow log is the authoritative signal; the SARIF
          # artifact uploads to code-scanning for richer review.
          GITLEAKS_ENABLE_COMMENTS: "false"
