name: CodeQL

# CodeQL static analysis for JavaScript/TypeScript.
# Runs on every push to main, every PR to main, and weekly on a fixed
# schedule so the latest CodeQL queries re-scan the codebase even if
# no new commits have landed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 07:00 UTC (09:00 Berlin summer, 08:00 winter)
    - cron: "0 7 * * 0"

permissions:
  contents: read
  security-events: write  # required to upload CodeQL results
  actions: read

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — SHA-pinned per v0.16.3 D-CA-003; Node-24 per v0.17.3 SC-2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2 — SHA-pinned per v0.16.3 D-CA-003; Node-24 per v0.17.3 SC-2
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2 — SHA-pinned per v0.16.3 D-CA-003; Node-24 per v0.17.3 SC-2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2 — SHA-pinned per v0.16.3 D-CA-003; Node-24 per v0.17.3 SC-2
        with:
          category: /language:${{ matrix.language }}
