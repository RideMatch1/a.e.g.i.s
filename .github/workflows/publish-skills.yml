name: Publish @aegis-scan/skills

# Triggered on tag-push matching the skills-v- prefix (e.g. skills-v0.1.0).
# Publishes @aegis-scan/skills with npm-provenance for SLSA Level-2
# attestation bound to this exact workflow run, this exact commit, and
# this exact npm-registry identity. Consumers verify via
# `npm audit signatures` or
# `npm view @aegis-scan/skills@<version> dist.attestations`.
#
# Scope: @aegis-scan/skills only. Scanner-family packages publish via
# .github/workflows/publish.yml on the v* tag-namespace; wizard
# publishes via .github/workflows/publish-wizard.yml on the wizard-v*
# namespace. This workflow touches none of those and the pnpm filter
# (-F @aegis-scan/skills) enforces that at publish-time.
#
# NPM auth: the existing repo secret NPM_TOKEN is scoped to the
# @aegis-scan org and therefore covers @aegis-scan/skills natively.
# No new secret provisioning is required for v0.1.0. If future
# decisions migrate skills to a different scope, swap NODE_AUTH_TOKEN
# to the matching secret before tagging.

on:
  push:
    tags:
      - 'skills-v*'

permissions:
  contents: read
  id-token: write  # required for npm --provenance (OIDC attestation)

jobs:
  publish:
    name: Publish @aegis-scan/skills with SLSA provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — SHA-pinned per v0.16.3 D-CA-003; Node-24 runner-support per v0.17.4 SC-5 Sub-arc B (Node-20 deprecation 2026-06-02)

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.3.0 — SHA-pinned per v0.16.3 D-CA-003

      - name: Setup Node.js + npm registry auth
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 — SHA-pinned per v0.16.3 D-CA-003; Node-24 runner-support per v0.17.4 SC-5 Sub-arc B (Node-20 deprecation 2026-06-02)
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build skills plus transitive deps
        run: pnpm -F @aegis-scan/skills... build

      - name: Verify skills tests before publish
        run: pnpm -F @aegis-scan/skills test

      - name: Verify no install-time lifecycle scripts (structural invariant)
        # Mirror of the publish-wizard gate. The @aegis-scan/skills
        # package must not declare preinstall, install, postinstall,
        # preuninstall, postuninstall, or prepare. A consumer running
        # `npm install @aegis-scan/skills` should execute zero scripts
        # from our namespace. This gate makes the invariant impossible
        # to regress silently.
        run: |
          node -e "
          const path = 'packages/skills/package.json';
          const pkg = require(process.cwd() + '/' + path);
          const danger = ['preinstall','install','postinstall','preuninstall','postuninstall','prepare'];
          const scripts = pkg.scripts || {};
          const hits = danger.filter((k) => Object.prototype.hasOwnProperty.call(scripts, k));
          if (hits.length > 0) {
            console.error('::error::' + path + ' declares install-time lifecycle script(s): ' + hits.join(', '));
            process.exit(1);
          }
          console.log(path + ': clean — no install-time lifecycle scripts declared');
          "

      - name: Verify markdown-only structural invariant under skills/ (R0-review A-1 + A-3)
        # The skills/ tree ships methodology text only. Any non-.md
        # file under that tree is either an accidentally-committed
        # binary, a stray script, or an executable artifact that has
        # no business in a markdown knowledge-base. Placeholder
        # README.md files in the category-dirs (defensive, mitre-
        # mapped, ops) are permitted because README.md IS .md.
        run: |
          NON_MD=$(find packages/skills/skills -type f ! -name '*.md' | head -20)
          if [ -n "$NON_MD" ]; then
            echo "::error::Non-markdown files found under packages/skills/skills/ — invariant violated"
            echo "$NON_MD"
            exit 1
          fi
          echo "packages/skills/skills/: clean — markdown-only invariant holds"

      - name: Verify no install-hint-style version-pins in shipped src
        # Mirrors the scanner and wizard publish gates. Tool names
        # like `aegis-skills list` are stable across 0.1.x releases
        # and should not carry parenthesized version anchors inside
        # string-literals. Catches accidents where a version-bump
        # leaves a literal "(skills-v0.1.0)" or "(v0.1.0)" inside a
        # user-facing message.
        run: |
          if grep -rnE "[\"'\`][^\"'\`]*\((skills-)?v0\.1\.[0-9]+\)[^\"'\`]*[\"'\`]" packages/skills/src/; then
            echo "::error::Install-hint-style version pin found in a"
            echo "string-literal in shipped skills source. Remove"
            echo "the version-pin — tool names are stable across 0.1.x"
            echo "and do not need version anchors. Compute runtime"
            echo "version references from package.json at build time"
            echo "rather than hardcoding the literal."
            exit 1
          fi

      - name: Generate CycloneDX SBOM (supply-chain visibility — SBOM-first)
        # End-user-side verifiability: the SBOM enumerates every transitive
        # dep with version + license + import-evidence, so a downstream
        # consumer can compare against the registry-served manifest and
        # detect drift independently of npm provenance. SLSA + SBOM are
        # complementary trust-layers: provenance proves who built it,
        # SBOM proves what is in it.
        #
        # MUST run BEFORE the pack-for-scrub step so that the tarball
        # verified by the scrub-gate + manifest-confusion-gate below is
        # byte-identical to the tarball pnpm publishes. Earlier order
        # (scrub → manifest → SBOM → publish) caused pnpm publish to
        # re-pack with the SBOM appended, so the published tarball-B
        # contained SBOM JSON that no gate had seen.
        run: bash scripts/generate-sbom.sh packages/skills

      - name: Verify no internal-codename leaks in shipped tarball
        # Safety-net between the local Rule #13 commit-msg hook and
        # the published binary: if a scrub-term slipped past the
        # developer hook the tarball-extract grep below catches it
        # before npm ever sees the bits.
        # SBOM-first ordering means the tarball packed here now contains
        # sbom.cdx.json, so the scrub-gate also covers the SBOM JSON.
        run: |
          cd packages/skills
          pnpm pack --pack-destination /tmp/tarball-scrub
          mkdir -p /tmp/tarball-check
          tar -xzf /tmp/tarball-scrub/*.tgz -C /tmp/tarball-check
          # Private codenames only. Generic product-refs like agent-
          # names are legitimate here per the wizard-cli keyword list
          # precedent and must NOT appear in this list.
          SCRUB='Spa-App|spa-app|lukas|hertle|ucos|voidai|sonnenhof|hundementor|myspa|hotel-pilot|UCOS-space|VoidAI|aegis-precision'
          if grep -riE "$SCRUB" /tmp/tarball-check/; then
            echo "::error::Internal codename leaked into shipped tarball; refusing to publish"
            exit 1
          fi

      - name: Manifest-confusion gate (tarball pkg.json vs source pkg.json)
        # Closes the threat-class disclosed by Darcy Clarke (June 2024):
        # a malicious tarball can ship a package.json that diverges from
        # what the registry-API exposes, making consumer-resolution and
        # actual-execution see different deps/scripts/bins. We prove the
        # tarball-manifest matches the source-manifest on the security-
        # critical fields (deps, scripts, bin, etc.) before publish.
        run: |
          TARBALL=$(ls /tmp/tarball-scrub/*.tgz | head -1)
          node scripts/check-manifest-confusion.mjs packages/skills "$TARBALL"

      - name: Publish @aegis-scan/skills with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -F @aegis-scan/skills publish --provenance --access public --no-git-checks
