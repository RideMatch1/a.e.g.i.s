name: Bug report
description: AEGIS crashed, produced unexpected output, or a scanner didn't work as documented
title: "[BUG] <short description>"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out as much as
        you can — reproducible reports get triaged first.

        **If this is a false-positive or false-negative on a specific scanner,
        please use the dedicated templates (False Positive / False Negative)
        instead of this one.**

        **If this is a security vulnerability in AEGIS itself, please do NOT
        open a public issue — see [SECURITY.md](../blob/main/SECURITY.md) for
        private disclosure.**

  - type: input
    id: version
    attributes:
      label: AEGIS version
      description: Output of `aegis --version` or the version in `package.json`
      placeholder: 0.9.2
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: v20.18.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (native)
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command run
      description: The exact command that produced the bug
      placeholder: "npx @aegis-scan/cli scan ."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: "The scanner should have flagged the SQL injection in lib/db.ts:45"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Full CLI output if possible (redact any real secrets / private paths)
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A small code snippet or a link to a public repo that reproduces the bug
      render: typescript

  - type: input
    id: scanner
    attributes:
      label: Scanner (if specific to one)
      description: e.g. `taint-analyzer`, `auth-enforcer`, `supply-chain`
      placeholder: "(optional)"

  - type: textarea
    id: json-output
    attributes:
      label: JSON scan output (trimmed)
      description: Output of `aegis scan . --format json` — trim to the relevant finding(s)
      render: json

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I can reproduce this on the latest published version
          required: false
