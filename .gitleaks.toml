# .gitleaks.toml — AEGIS gitleaks configuration.
#
# Purpose: extend the upstream default ruleset with scoped allowlists
# for paths where secret-like strings are legitimate (pedagogical docs,
# upstream forks kept byte-identical, scanner's own test fixtures, and
# benchmark canary fixtures that are the validation surface by design).
#
# Design:
#   - Each allowlist entry covers one structural class with its own
#     rationale (hence [[allowlists]] array-of-tables over single
#     [allowlist] — scales to multiple distinct classes cleanly).
#   - Scope is tightly path-bounded. Every file outside these paths
#     continues to run the full upstream ruleset (generic-api-key, AWS,
#     GCP, GitHub, Slack, Stripe, high-entropy, plus whatever the
#     default ruleset extends over time).
#   - Independent coverage against real leaks in published content is
#     provided by the tarball-scrub gates in .github/workflows/
#     publish-*.yml. Those gates operate on tarball contents
#     (dist/ + README + CHANGELOG + ATTRIBUTION) which do NOT include
#     test fixtures, canary fixtures, or pedagogical docs. Allowlisting
#     these paths here does NOT relax the production-ship-path coverage.
#
# Historical reference:
#   2026-04-23 v0.17.1 main-push: three findings reported on snailsploit-
#     fork subtree (all RuleID generic-api-key, all base64-encoded RFC
#     WebSocket test-vectors). Allowlist 1 below covers that class.
#   2026-04-24 v0.17.2 SC-8: empirical full-enumeration of the
#     self-scan 0/F/48 baseline classified all 48 findings as gitleaks
#     FPs in 3 structural classes — scanner test fixtures (23),
#     benchmark canary fixtures (23), pedagogical docs + one brief-
#     generator literal (2). The brief-generator literal was fixed in
#     source (`ENCRYPTION_KEY=<64-hex-chars>` placeholder replaces the
#     hex-prefix that tripped gitleaks' generic-api-key rule) so no
#     allowlist entry is needed for that one file. Allowlists 2-4
#     below cover the remaining three classes.

[extend]
useDefault = true

[[allowlists]]
description = "snailsploit-fork — byte-identical upstream pedagogical content (RFC 6455 WebSocket test-vectors)"
paths = [
    '''^packages/skills/skills/offensive/snailsploit-fork/''',
]

[[allowlists]]
description = "elementalsouls-fork — byte-identical upstream OSINT pedagogical content showing private_key/credential detection-rule examples (the patterns ARE the teaching content)"
paths = [
    '''^packages/skills/skills/osint/elementalsouls-fork/''',
]

[[allowlists]]
description = "matty-fork — byte-identical upstream offensive pedagogical content showing detection-rule examples (paired with elementalsouls-fork allowlist; same class as snailsploit-fork)"
paths = [
    '''^packages/skills/skills/offensive/matty-fork/''',
]

[[allowlists]]
description = "AEGIS scanner's own test fixtures — by-design secret-like strings for detection validation (entropy-scanner, jwt-detector, crypto-auditor, gitleaks wrapper, trufflehog wrapper, integration.fix-guidance)"
paths = [
    '''^packages/scanners/__tests__/''',
]

[[allowlists]]
description = "AEGIS benchmark canary fixtures — both TP-* (true-positive) and FP-* (false-positive) validation surface; the directory IS the benchmark by design"
paths = [
    '''^packages/benchmark/canary-fixtures/''',
]

[[allowlists]]
description = "Pedagogical docs: PII-safe-logger example shows an api_key getting redacted (the literal IS the teaching point)"
paths = [
    '''^docs/patterns/foundation/logger-pii-safe\.md$''',
]

[[allowlists]]
description = "Historic literal placeholder: 'ENCRYPTION_KEY=0af1b2c3d4...64-hex-chars' appeared in packages/wizard-cli/src/brief/sections.ts in commit 975c5bb as an env-var-template for the consumer's openssl-rand-hex-32 output. Working-tree value replaced with angle-bracket placeholder '<64-hex-chars>' in v0.17.2 SC-8 — this regex suppresses the historic-commit finding in gitleaks git-history mode. Pattern is unique (contains the literal ellipsis + suffix text) so no false-negative risk on real 64-hex-char secrets. regexTarget='match' makes the regex test against the full match-line context rather than the extracted high-entropy secret-portion (gitleaks-action 8.24.3 defaults to 'secret' and may extract just the hex-prefix, causing the narrower-regex to miss)."
regexes = ['''0af1b2c3d4\.{3}64-hex-chars''']
regexTarget = "match"

[[allowlists]]
description = "CHANGELOG + B3-fix historic-literal reference: v0.17.3 B3 obfuscated the pedagogical api_key in docs/patterns/foundation/logger-pii-safe.md from 'sk_live_abc123' to 'sk_live_EXAMPLE'. The CHANGELOG entry documenting that fix quotes the pre-fix literal verbatim for audit-trail, and the git-history commit-diffs show the removal-line in the B3 commit. Local `gitleaks detect --source .` passes because only the obfuscated value remains in working-tree; gitleaks-action 8.24.3 CI run fires because it reads commit-diffs across the 12 v0.17.3 commits AND its default regexTarget='secret' extracts just the high-entropy 'abc123' portion from the generic-api-key rule. regexTarget='match' extends the regex to the full match-line so the allowlist fires reliably in both local and CI git-history scan modes. Same class as allowlist 5 (ENCRYPTION_KEY historic placeholder). Scope: paths+regexes AND-combine in gitleaks v8 — only fires in .md files; real Stripe-live-keys are 32-char random (not 'abc123'), zero false-negative risk on real secrets."
regexes = ['''sk_live_abc123''']
regexTarget = "match"
paths = ['''\.md$''']
